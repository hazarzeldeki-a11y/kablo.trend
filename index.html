<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kablo Trend</title>
<style>
body{
  font-family: Arial;
  margin:0;
  background:#f2f2f2;
}

header{
  background:black;
  color:white;
  padding:20px;
  text-align:center;
  font-size:26px;
  font-weight:bold;
}

.container{
  max-width:800px;
  margin:30px auto;
  display:grid;
  gap:20px;
}

.product{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  display:flex;
  gap:20px;
  align-items:center;
}

.product img{
  width:120px;
  border-radius:10px;
}

.price{
  color:green;
  font-size:22px;
  margin:10px 0;
}

button{
  background:black;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#333;
}
</style>
</head>

<body>

<header>Kablo Trend ⚡ Hızlı Şarj Ürünleri</header>

<div class="container">

<div class="product">
  <img src="https://via.placeholder.com/120" />
  <div>
    <h3>Type-C Hızlı Şarj Kablosu</h3>
    <p>1 metre örgülü dayanıklı kablo</p>
    <div class="price">179 TL</div>
    <a href="https://wa.me/90XXXXXXXXXX?text=Type-C%20kablo%20siparişi%20vermek%20istiyorum">
      <button>Satın Al</button>
    </a>
  </div>
</div>

<div class="product">
  <img src="https://via.placeholder.com/120" />
  <div>
    <h3>Mıknatıslı Telefon Tutucu</h3>
    <p>Araba içi güçlü tutuş</p>
    <div class="price">249 TL</div>
    <a href="https://wa.me/90XXXXXXXXXX?text=Telefon%20tutucu%20siparişi">
      <button>Satın Al</button>
    </a>
  </div>
</div>

</div>

</body>
</html>
